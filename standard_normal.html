<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Normal Distribution with Z-score</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        margin: 30px;
    }
    .controls {
        margin-bottom: 20px;
    }
    label {
        display: block;
        margin: 8px 0;
    }
    canvas {
        max-width: 900px;
        margin: auto;
    }
    #zFormula {
        font-size: 16px;
        margin-top: 20px;
    }
</style>
</head>
<body>

<h2>Normal Distribution: P(X ≤ x)</h2>

<div class="controls">
    <label>
        Mean (μ):
        <input type="range" id="mean" min="-10" max="10" step="0.1" value="0">
        <span id="meanValue">0</span>
    </label>

    <label>
        Standard Deviation (σ):
        <input type="range" id="std" min="0.5" max="5" step="0.1" value="1">
        <span id="stdValue">1</span>
    </label>

    <label>
        x value:
        <input type="range" id="xValue" min="-10" max="10" step="0.1" value="0">
        <span id="xDisplay">0</span>
    </label>
</div>

<h3 id="probabilityDisplay">P(X ≤ x) = 0.5000</h3>

<canvas id="normalChart" width="600" height="300"></canvas>

<div id="zFormula">
  Z = <span style="display:inline-block; vertical-align: middle;">
        <span style="border-bottom:1px solid; padding:0 2px;">x - μ</span>
        <br>
        <span style="display:block; text-align:center;">σ</span>
      </span> = 0.00
</div>

<canvas id="zChart" width="260" height="170"></canvas>

<script>
function normalPDF(x, mean, std) {
    return (1 / (std * Math.sqrt(2 * Math.PI))) *
        Math.exp(-0.5 * Math.pow((x - mean) / std, 2));
}

// Numerical approximation of CDF
function normalCDF(x, mean, std) {
    let a = -10;
    let b = x;
    let n = 1000;
    let h = (b - a) / n;
    let sum = normalPDF(a, mean, std) + normalPDF(b, mean, std);
    for (let i = 1; i < n; i++) {
        let xi = a + i * h;
        sum += normalPDF(xi, mean, std) * (i % 2 === 0 ? 2 : 4);
    }
    return (h / 3) * sum;
}

// Main normal chart
const ctx = document.getElementById('normalChart').getContext('2d');
let chart = new Chart(ctx, {
    type: 'line',
    data: {
        datasets: [
            {
                label: 'X PDF',
                borderColor: 'red',
                borderWidth: 2,
                fill: false,
                data: [],
                pointRadius: 0
            },
            {
                label: 'Shaded Area',
                backgroundColor: 'rgba(0, 0, 255, 0.3)',
                borderColor: 'rgba(0,0,0,0)',
                fill: true,
                data: [],
                pointRadius: 0
            }
        ]
    },
    options: {
        responsive: true,
        parsing: false,
        animation: false,
        scales: {
            x: { type: 'linear', min: -10, max: 10 },
            y: { beginAtZero: true, min:0, max:0.8 }
        }
    }
});

// Z-normal chart
const zCtx = document.getElementById('zChart').getContext('2d');
let zChart = new Chart(zCtx, {
    type: 'line',
    data: {
        datasets: [
            {
                label: 'Z PDF',
                borderColor: 'green',
                borderWidth: 2,
                fill: false,
                data: [],
                pointRadius: 0
            },
            {
                label: 'Shaded Area',
                backgroundColor: 'rgba(0, 0, 255, 0.3)',
                borderColor: 'rgba(0,0,0,0)',
                fill: true,
                data: [],
                pointRadius: 0
            }
        ]
    },
    options: {
        responsive: true,
        parsing: false,
        animation: false,
        scales: {
            x: { type: 'linear', min: -4, max: 4 },
            y: { beginAtZero: true }
        }
    }
});

function updateChart() {
    let mean = parseFloat(document.getElementById("mean").value);
    let std = parseFloat(document.getElementById("std").value);
    let xCut = parseFloat(document.getElementById("xValue").value);

    document.getElementById("meanValue").innerText = mean;
    document.getElementById("stdValue").innerText = std;
    document.getElementById("xDisplay").innerText = xCut;

    // Main chart
    let data = [];
    let shaded = [];
	let zshaded = [];
    for (let x = -10; x <= 10; x += 0.05) { // finer steps
        let y = normalPDF(x, mean, std);
        data.push({x: x, y: y});
        if (x <= xCut+0.025) shaded.push({x: x, y: y});
    }

    chart.data.datasets[0].data = data;
    chart.data.datasets[1].data = shaded;

    let prob = normalCDF(xCut, mean, std);
    document.getElementById("probabilityDisplay").innerText =
        "P(X ≤ x) = " + prob.toFixed(4);

    chart.update();

    // Z-score
    let z = (xCut - mean) / std;
    document.getElementById("zFormula").innerHTML =
  `<span style="font-size:1em;">
     Z = <span style="display:inline-block; vertical-align: middle;">
      <span style="border-bottom:1px solid; padding:0 4px;">
        X - μ
      </span>
      <br>
      <span style="display:block; text-align:center;">
        	σ 
      </span>
    </span> = <span style="display:inline-block; vertical-align: middle;">
      <span style="border-bottom:1px solid; padding:0 4px;">
        ${xCut.toFixed(2)} - (${mean.toFixed(2)})
      </span>
      <br>
      <span style="display:block; text-align:center;">
        ${std.toFixed(2)}
      </span>
    </span> = ${z.toFixed(2)}`;


    // Z-normal chart
    let zData = [];
    for (let zi = -4; zi <= 4; zi += 0.05) {
        let y = normalPDF(zi, 0, 1);
        zData.push({x: zi, y: y});
		if (zi <= z) zshaded.push({x: zi, y: y});
    }
    zChart.data.datasets[0].data = zData;
	zChart.data.datasets[1].data = zshaded;
    zChart.update();
}

document.getElementById("mean").addEventListener("input", updateChart);
document.getElementById("std").addEventListener("input", updateChart);
document.getElementById("xValue").addEventListener("input", updateChart);

updateChart();
</script>
</body>
</html>
