<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Statistics Lab - Interactive Simulations</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
}
.panel {
    width: 250px;
    background-color: #f0f0f0;
    padding: 20px;
    box-sizing: border-box;
    border-right: 2px solid #ccc;
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* space between menu and footer */
}
.panel .menu {
    display: flex;
    flex-direction: column;
}
.panel h1 {
    font-size: 20px;
    margin-bottom: 20px;
    text-align: center;
}
.panel button {
    margin: 5px 0;
    padding: 12px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 4px;
    background-color: #ddd;
    transition: background-color 0.2s;
}
.panel button:hover { background-color: #ccc; }
.panel button.active { background-color: #007BFF; color: white; }
/* Footer with name link */
.panel .footer {
    font-size: 14px;
    text-align: center;
    margin-top: 20px;
}
.panel .footer a {
    text-decoration: none;
    color: #007BFF;
}
.panel .footer a:hover {
    text-decoration: underline;
}

.content { flex-grow: 1; padding: 0; }
iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<div class="panel">
    <div class="menu">
        <h1>Statistics Lab</h1>
        <button id="btnStandard" class="active">Standard Normal Distribution</button>
        <button id="btnXbar">Sampling Distribution of X&#772</button>
        <button id="btnCI">Confidence Interval Exploration (mu-hat)</button>
    </div>
    <div class="footer">
        Developed by <a href="index.html" target="_blank">Stevenson Bol&#237;var</a>
    </div>
</div>

<div class="content">
    <iframe id="labFrame" src="standard_normal.html"></iframe>
</div>

<script>
const frame = document.getElementById('labFrame');

const buttons = {
    btnStandard: "standard_normal.html",
    btnXbar: "xbar_distribution.html",
    btnCI: "confidence_interval.html"
};

for (let btnId in buttons) {
    document.getElementById(btnId).addEventListener('click', () => {
        frame.src = buttons[btnId];
        for (let b in buttons) {
            document.getElementById(b).classList.remove('active');
        }
        document.getElementById(btnId).classList.add('active');
    });
}
</script>

</body>
</html>
